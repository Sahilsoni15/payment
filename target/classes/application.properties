spring.application.name=Paymentservice

server.port=8088

# Sahi MongoDB Credentials aur Database Name
spring.data.mongodb.uri=mongodb://admin:admin123@localhost:27017/paymentdb?authSource=admin

security.basic.enabled=false
management.security.enabled=false

# Log at the root level
logging.level.root=INFO

# Log at the DEBUG level for a specific package
logging.level.com.example=DEBUG

# Output to a log file (optional)
logging.file.name=logs/payment.log

# Set log pattern (optional)
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n

management.endpoints.web.exposure.include=health,prometheus
management.endpoint.metrics.enabled=true
management.prometheus.metrics.export.enabled=true